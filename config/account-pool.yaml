# Seelex 多账号池配置
# 支持多个 Provider 自动轮询（round-robin）
# 使用方式: go run . -c config/account-pool.yaml
defaults:
  provider: ""
  max_tokens: 8192
  timeout: 120s
  temperature: 0
websearch:
  provider: tavily
  api_key: ""  # 填入你的 Tavily API Key
  max_results: 5
  include_answer: true
  search_depth: advanced  # basic | advanced


accounts:
  - name: openai-main
    provider: openai
    model: gpt-4o
    base_url: https://api.openai.com/v1
    api_key: sk-your-openai-key

  - name: anthropic-main
    provider: anthropic
    model: claude-sonnet-4-20250514
    base_url: https://api.anthropic.com/v1
    api_key: sk-ant-your-anthropic-key

  - name: openai-backup
    provider: openai
    model: gpt-4o-mini
    base_url: https://api.openai.com/v1
    api_key: sk-your-backup-key

mcp_servers: []