# Seelex CI — GitHub Actions
# 每次 push / PR 到 main 时运行
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        go: ["1.25"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: 缓存 Go 模块
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: 下载依赖
        run: go mod download

      - name: 编译检查
        run: go build ./...

      - name: 代码检查
        run: go vet ./...

      - name: 运行测试
        run: go test ./... -v -count=1 -timeout=120s

      - name: 检查硬编码密钥
        run: |
          ! grep -rn '"sk-\|"password\|"token\|"secret' --include="*.go" .
        shell: bash

      - name: 检查 return nil, nil
        run: |
          ! grep -rn "return nil, nil" --include="*.go" .
        shell: bash
